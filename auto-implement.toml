description = "Implement a task autonomously with ideation sub-agents and dedicated code review."
prompt = """
<objective>
Implement the given task autonomously while following the `tasky-auto-implement` skill, guided by `.ai/CODE_REFERENCE.md`.
</objective>

<context>
Task Description: $ARGUMENTS
</context>

<process>
1. Activate and use the `tasky-auto-implement` skill.
2. Follow its 5-step workflow autonomously:
    - Step 1: Context Gathering (Reference `.ai/CODE_REFERENCE.md`).
    - Step 2: Ideation & Planning (Sub-agent: `.ai/agents/ideation-agent.md`).
    - Step 3: Execution (Sub-agent: `.ai/agents/execution-agent.md`).
    - Step 4: Review (Sub-agent: `.ai/agents/review-agent.md`).
    - Step 5: Final Summary & Testing Guide.
</process>

<success_criteria>
- Strict adherence to the `tasky-auto-implement` workflow.
- Autonomous selection of the best approach without user confirmation.
- Robust execution and dedicated self-review using severity classifications.
- Clear final summary and testing instructions provided to the user.
</success_criteria>
"""
