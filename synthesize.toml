description = "Maps the codebase and creates structured project reference documents."
prompt = """
<objective>
Map the entire codebase using the `tasky-synthesize` skill to produce a comprehensive set of reference documents in the `.ai/` directory.
</objective>

<process>
1. Activate and use the `tasky-synthesize` skill.
2. Follow its process to discover and analyze the tech stack, architecture, conventions, design patterns, testing patterns, code quality standards, and product requirements.
3. Read each template from `assets/` and fill it with project-specific content.
4. Produce the following files in the `.ai/` directory:
    - `.ai/CODE_REFERENCE.md` — Tech stack, architecture, and project structure overview.
    - `.ai/TEST_PATTERNS.md` — Testing conventions, naming, mocks, and coverage expectations.
    - `.ai/PROJECT_PATTERNS.md` — Design patterns with examples and extension guidance.
    - `.ai/CODE_REVIEW_GUIDELINES.md` — Review checklist for the Review Agent.
    - `.ai/PRODUCT_REQUIREMENTS.md` — Product vision and UX requirements.
    - `.ai/CODE_QUALITY_GUIDELINES.md` — Naming conventions, quality standards, and best practices.
</process>

<success_criteria>
- All six `.ai/` documents are created with project-specific content.
- No unfilled placeholder brackets remain in any document.
- Every document includes concrete file paths and code examples from the project.
</success_criteria>
"""
