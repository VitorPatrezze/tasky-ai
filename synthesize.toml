description = "Maps the codebase and creates 1 markdown file called '.ai/CODE_REFERENCE.md' with patterns, rules, and context."
prompt = """
<objective>
Map the entire codebase to understand its patterns, business rules, requirements, and other important aspects.
Create a SINGLE markdown file called `.ai/CODE_REFERENCE.md` (creating the `.ai` folder if it doesn't exist) that contains this information.
This file will be the main source of direction for future tasks.
This must be the ONLY file created by this workflow.
</objective>

<process>
1. Analyze the project structure, language, framework, design patterns, and conventions.
2. Identify core business rules, features, and requirements that are implemented.
3. Synthesize the findings into a clear, structured document.
4. Write the results into EXACTLY ONE file: `.ai/CODE_REFERENCE.md`. Do not create any other markdown files, planning files, or state files.
</process>

<success_criteria>
- Comprehensive understanding of the codebase is documented.
- `.ai/CODE_REFERENCE.md` is the ONLY file created.
</success_criteria>
"""
