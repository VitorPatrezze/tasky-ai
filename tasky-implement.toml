description = "Implement a task with a rigorous workflow, ideation sub-agents, and dedicated code review."
prompt = """
<objective>
Implement the given task while following the `tasky-implement` skill, guided by the project's `.ai/` reference documents.
</objective>

<context>
Task Description: $ARGUMENTS
</context>

<process>
1. Activate and use the `tasky-implement` skill.
2. Follow its 6-step workflow strictly:
    - Step 1: Context Gathering (Reference `.ai/` documents and check for provided plan files like `.ai/REVIEW_PLAN.md`).
    - Step 2: Ideation (Sub-agent: `.ai/agents/tasky-ideation-agent.md`).
    - Step 3: User Discussion (MANDATORY STOP).
    - Step 4: Execution (Sub-agent: `.ai/agents/tasky-execution-agent.md` — guided by `.ai/tasky-code-quality-guidelines.md` and `.ai/tasky-test-patterns.md`).
    - Step 5: Review (Sub-agent: `.ai/agents/tasky-review-agent.md` — guided by `.ai/tasky-code-review-guidelines.md` and `.ai/tasky-test-patterns.md`).
    - Step 6: Final Summary & Testing Guide (and ask to delete `.ai/REVIEW_PLAN.md` if used).
    - Step 7: (Optional) Update Reference Documents if needed.

</process>

<success_criteria>
- Strict adherence to the `tasky-implement` workflow.
- Clear implementation options presented for the solution.
- Explicit user interaction in Step 3 to confirm the plan.
- Robust execution and dedicated self-review using severity classifications.
- Clear final summary and testing instructions provided to the user.
</success_criteria>
"""
