description = "Maps the codebase and creates structured project reference documents."
prompt = """
<objective>
Map the entire codebase using the `tasky-synthesize` skill to produce a comprehensive set of reference documents in the `.ai/` directory.
</objective>

<process>
1. Activate and use the `tasky-synthesize` skill.
2. Follow its process to discover and analyze the tech stack, architecture, conventions, design patterns, testing patterns, code quality standards, and product requirements.
3. Check if the `.ai/` reference documents already exist in the workspace.
4. Read each template from `reference/`. If a reference file already exists, UPDATE it to merge existing content with new findings or new template formatting, ensuring that the essence of the existing content is preserved. If it does not exist, fill the template with project-specific content to create it.
5. Produce or update the following files in the `.ai/` directory:
    - `.ai/tasky-code-reference.md` — Tech stack, architecture, and project structure overview.
    - `.ai/tasky-test-patterns.md` — Testing conventions, naming, mocks, and coverage expectations.
    - `.ai/tasky-project-patterns.md` — Design patterns with examples and extension guidance.
    - `.ai/tasky-code-review-guidelines.md` — Review checklist for the Review Agent.
    - `.ai/tasky-product-requirements.md` — Product vision and UX requirements.
    - `.ai/tasky-code-quality-guidelines.md` — Naming conventions, quality standards, and best practices.
</process>

<success_criteria>
- All six `.ai/` documents are created or updated with project-specific content.
- Existing files are updated (preserving essential content) rather than overwritten blindly.
- No unfilled placeholder brackets remain in any document.
- Every document includes concrete file paths and code examples from the project.
</success_criteria>
"""
