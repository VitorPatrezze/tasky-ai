description = "Implement a task autonomously with ideation sub-agents and dedicated code review."
prompt = """
<objective>
Implement the given task autonomously while following the `tasky-auto-implement` skill, guided by the project's `.ai/` reference documents.
</objective>

<context>
Task Description: $ARGUMENTS
</context>

<process>
1. Activate and use the `tasky-auto-implement` skill.
2. Follow its 5-step workflow autonomously:
    - Step 1: Context Gathering (Reference `.ai/` documents and check for provided plan files like `.ai/REVIEW_PLAN.md`).
    - Step 2: Ideation & Planning (Sub-agent: `.ai/agents/tasky-ideation-agent.md`).
    - Step 3: Execution (Sub-agent: `.ai/agents/tasky-execution-agent.md` — guided by `.ai/CODE_QUALITY_GUIDELINES.md` and `.ai/TEST_PATTERNS.md`).
    - Step 4: Review (Sub-agent: `.ai/agents/tasky-review-agent.md` — guided by `.ai/CODE_REVIEW_GUIDELINES.md` and `.ai/TEST_PATTERNS.md`).
    - Step 5: Final Summary & Testing Guide (and ask to delete `.ai/REVIEW_PLAN.md` if used).
    - Step 6: (Optional) Update Reference Documents if needed.
</process>

<success_criteria>
- Strict adherence to the `tasky-auto-implement` workflow.
- Autonomous selection of the best approach without user confirmation.
- Robust execution and dedicated self-review using severity classifications.
- Clear final summary and testing instructions provided to the user.
</success_criteria>
"""
